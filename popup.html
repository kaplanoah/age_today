<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
      padding: 20px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      text-align: center;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #555;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #4a6cf7;
    }

    #result {
      margin-top: 16px;
      text-align: center;
      font-size: 15px;
      min-height: 22px;
      color: #333;
    }

    #result.error {
      color: #c0392b;
      font-size: 13px;
    }

    #result .age {
      font-size: 32px;
      font-weight: 700;
      color: #4a6cf7;
      display: block;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>Age Today</h1>
  <label for="birthdate">Birth date</label>
  <input type="text" id="birthdate" placeholder="e.g. March 5 1990, 3/5/1990">
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>

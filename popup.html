<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;600;700&display=swap">
  <style>
    @font-face {
      font-family: "Mackinac";
      src: url("fonts/Mackinac-Medium.woff2") format("woff2"),
           url("fonts/Mackinac-Medium.woff") format("woff");
      font-weight: 500;
      font-style: normal;
    }

    :root {
      --bg: #FFFFFF;
      --input-bg: #FFFFFF;
      --text: #3A322B;
      --text-muted: #6b6158;
      --text-faint: #9b9189;
      --text-faintest: #b0a99f;
      --text-faintest-hover: #8a8279;
      --border: #FEC654;
      --copy-btn-bg: #9FE0DD;
      --toggle-off: #d4cdc8;
      --placeholder: #948c84;
      --divider: #ede8e3;
    }

    body.dark {
      --bg: #3A322B;
      --input-bg: #4a3e35;
      --text: #FFFFFF;
      --text-muted: #d4cdc8;
      --text-faint: #a09488;
      --text-faintest: #706860;
      --text-faintest-hover: #a09488;
      --border: #FEC654;
      --copy-btn-bg: #4a9e9b;
      --toggle-off: #5a4e48;
      --placeholder: #9a9088;
      --divider: #4a3e35;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: "Red Hat Text", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .main-page {
      padding: 23px 20px 30px;
      position: relative;
    }

    h1 {
      font-family: "Mackinac", serif;
      font-size: 19px;
      margin-bottom: 16px;
      text-align: center;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-bottom: 4px;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
    }

    input[type="text"] {
      flex: 1;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
      background: var(--input-bg);
      color: var(--text);
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--border);
    }

    input[type="text"]::placeholder {
      color: var(--placeholder);
    }

    #result {
      color: var(--text);
    }

    #result:empty {
      display: none;
    }

    #result.error {
      margin-top: 3px;
      text-align: center;
      text-wrap: balance;
      color: #F69577;
      font-size: 13px;
      font-weight: 500;
    }

    .age-rows {
      margin-top: 10px;
      display: grid;
      grid-template-columns: auto auto;
      justify-content: center;
      align-items: center;
      row-gap: 8px;
      column-gap: 13px;
      padding-left: 30px;
    }

    .age-rows .age {
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      line-height: 1;
    }

    .age-rows .age.word {
      font-size: 16px;
      font-weight: 600;
    }

    .age-rows .copy-btn {
      justify-self: start;
    }

    .copy-btn.small {
      font-size: 10px;
      padding: 5px 6px 3px 4px;
      gap: 5px;
    }

    .copy-btn.small svg {
      width: 12px;
      height: 12px;
    }

    .copy-btn {
      font-family: inherit;
      font-size: 12px;
      padding: 5px 6px 4px 5px;
      border: none;
      border-radius: 5px;
      background: var(--copy-btn-bg);
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
      opacity: 0.7;
    }

    .copy-btn .shortcut {
      opacity: 0.8;
    }

    .copy-btn:hover {
      opacity: 0.8;
    }

    .copy-btn svg {
      width: 16px;
      height: 16px;
      position: relative;
      top: 0px;
      left: 1px;
    }

    .on-this-date {
      margin-top: 12px;
      margin-bottom: -6px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      line-height: 1.3;
      text-wrap: balance;
    }

    .on-this-date .emoji {
      font-size: 14px;
      margin-right: 3px;
      position: relative;
      top: 1px;
    }

    .on-this-date-date {
      margin-top: 4px;
      font-size: 11px;
      font-weight: 300;
      color: var(--text-faint);
    }

    .footer {
      position: absolute;
      bottom: 6px;
      left: 8px;
      font-size: 10px;
      color: var(--text-faintest);
    }

    .footer a {
      color: var(--text-faintest);
      text-decoration: underline;
    }

    .footer a:hover {
      color: var(--text-faintest-hover);
    }

    .settings-btn {
      position: absolute;
      bottom: 3px;
      right: 3px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text-faintest);
      line-height: 0;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .settings-btn:hover,
    .settings-btn.active {
      color: var(--text-muted);
    }

    .settings-btn .close-icon {
      display: none;
      line-height: 0;
      position: relative;
      top: 3px;
    }

    .settings-btn.active .gear-icon { display: none; }
    .settings-btn.active .close-icon { display: block; }

    /* Settings panel */

    .settings-panel {
      display: none;
      border-top: 1px solid var(--divider);
      padding: 20px 20px 20px;
    }

    .settings-title {
      font-family: "Mackinac", serif;
      font-size: 17px;
      color: var(--text);
      margin-top: -6px;
      margin-left: -8px;
      margin-bottom: 18px;
    }

    .settings-panel.open {
      display: block;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .settings-row + .settings-row {
      margin-top: 18px;
    }

    .size-btns {
      display: flex;
      gap: 8px;
    }

    .size-btn {
      font-family: inherit;
      font-weight: 400;
      border: 1px solid var(--text-faintest);
      border-radius: 8px;
      background: none;
      color: var(--text);
      cursor: pointer;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      transition: border-color 0.15s, border-width 0.15s;
    }

    .size-btn.selected {
      border: 2px solid var(--border);
    }

    .size-btn.small { font-size: 12px; }
    .size-btn.large { font-size: 16px; }

    body.large h1 { font-size: 22px; }
    body.large label { font-size: 15px; }
    body.large input[type="text"] { font-size: 16px; }
    body.large #result.error { font-size: 15px; }
    body.large .age-rows .age { font-size: 38px; }
    body.large .age-rows .age.word { font-size: 20px; }
    body.large .copy-btn { font-size: 14px; }
    body.large .copy-btn.small { font-size: 12px; }
    body.large .on-this-date { font-size: 13px; }
    body.large .age-rows { margin-bottom: 3px; }
    body.large .on-this-date-date { font-size: 13px; }
    body.large .settings-title { font-size: 20px; }
    body.large .settings-label { font-size: 16px; }
    body.large .footer { font-size: 12px; }

    .settings-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--toggle-off);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: var(--border);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(16px);
    }
  </style>
</head>
<body>
  <div class="main-page">
    <button class="settings-btn" id="settings-btn" title="Settings">
      <svg class="gear-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3.5"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <svg class="close-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"/>
      </svg>
    </button>
    <h1>Age Today</h1>
    <div class="input-row">
      <label for="birthdate">DOB</label>
      <input type="text" id="birthdate" placeholder="e.g. Mar 28 1986 or 3/28/86">
    </div>
    <div id="result"></div>
    <div class="footer">Made for <a href="https://advocatesforchildren.org/donate/" target="_blank">AFC</a> &lt;3</div>
  </div>

  <div class="settings-panel" id="settings-panel">
    <div class="settings-title">Settings</div>
    <div class="settings-row">
      <span class="settings-label">Dark mode</span>
      <label class="toggle">
        <input type="checkbox" id="dark-mode-toggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="settings-row">
      <span class="settings-label">Text size</span>
      <div class="size-btns">
        <button class="size-btn small" id="size-normal" type="button">Aa</button>
        <button class="size-btn large" id="size-large" type="button">Aa</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

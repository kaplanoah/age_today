<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;600;700&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: "Red Hat Text", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #FFFFFF;
      color: #3A322B;
      padding: 20px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 4px;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: #3A322B;
      white-space: nowrap;
    }

    input[type="text"] {
      flex: 1;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #FEC654;
      border-radius: 6px;
      outline: none;
      background: #FFFFFF;
      color: #3A322B;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #FEC654;
    }

    input[type="text"]::placeholder {
      color: #b0a99f;
    }

    #result {
      color: #3A322B;
    }

    #result:empty {
      display: none;
    }

    #result.error {
      margin-top: 16px;
      text-align: center;
      color: #F69577;
      font-size: 13px;
      font-weight: 500;
    }

    .age-row {
      margin-top: 12px;
      display: flex;
      align-items: center;
      position: relative;
    }

    .age-row .age {
      font-size: 32px;
      font-weight: 700;
      color: #3A322B;
      width: 100%;
      text-align: center;
      padding-right: 20px;
    }

    .age-row.word-row {
      margin-top: 4px;
    }

    .age-row.word-row .age {
      font-size: 18px;
      font-weight: 600;
    }

    .age-row.word-row .copy-btn {
      font-size: 11px;
      gap: 7px;
    }

    .age-row.word-row .copy-btn svg {
      width: 14px;
      height: 14px;
      left: 2px;
      top: 0px;
    }

    .copy-btn {
      font-family: inherit;
      font-size: 13px;
      padding: 7px 6px 5px;
      border: none;
      border-radius: 5px;
      background: #9FE0DD;
      color: #3A322B;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      position: absolute;
      right: 0;
      opacity: 0.7;
      width: 62px;
    }

    .copy-btn:hover {
      opacity: 0.8;
    }

    .copy-btn svg {
      width: 16px;
      height: 16px;
      position: relative;
      top: 1px;
      left: 1px;
    }

  </style>
</head>
<body>
  <h1>Age Today</h1>
  <div class="input-row">
    <label for="birthdate">DOB</label>
    <input type="text" id="birthdate" placeholder="e.g. Mar 28, 1986, 3/28/86">
  </div>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>

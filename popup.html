<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;600;700&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: "Red Hat Text", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #FFFFFF;
      color: #3A322B;
      padding: 20px 20px 30px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 4px;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: #3A322B;
      white-space: nowrap;
    }

    input[type="text"] {
      flex: 1;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #FEC654;
      border-radius: 6px;
      outline: none;
      background: #FFFFFF;
      color: #3A322B;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #FEC654;
    }

    input[type="text"]::placeholder {
      color: #b0a99f;
    }

    #result {
      color: #3A322B;
    }

    #result:empty {
      display: none;
    }

    #result.error {
      margin-top: 16px;
      text-align: center;
      color: #F69577;
      font-size: 13px;
      font-weight: 500;
    }

    .age-rows {
      margin-top: 10px;
      display: grid;
      grid-template-columns: auto auto;
      justify-content: center;
      align-items: center;
      row-gap: 8px;
      column-gap: 13px;
      padding-left: 30px;
    }

    .age-rows .age {
      font-size: 32px;
      font-weight: 700;
      color: #3A322B;
      text-align: center;
    }

    .age-rows .age.word {
      font-size: 16px;
      font-weight: 600;
    }

    .age-rows .copy-btn {
      justify-self: start;
    }

    .copy-btn.small {
      font-size: 10px;
      padding: 5px 6px 3px 4px;
      gap: 5px;
    }

    .copy-btn.small svg {
      width: 12px;
      height: 12px;
    }

    .copy-btn {
      font-family: inherit;
      font-size: 12px;
      padding: 5px 6px 4px 5px;
      border: none;
      border-radius: 5px;
      background: #9FE0DD;
      color: #3A322B;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
      opacity: 0.7;
    }

    .copy-btn .shortcut {
      opacity: 0.8;
    }

    .copy-btn:hover {
      opacity: 0.8;
    }

    .copy-btn svg {
      width: 16px;
      height: 16px;
      position: relative;
      top: 0px;
      left: 1px;
    }

    .footer {
      position: fixed;
      bottom: 6px;
      left: 8px;
      padding-top: 20px;
      font-size: 10px;
      color: #b0a99f;
    }

    .footer a {
      color: #b0a99f;
      text-decoration: underline;
    }

    .footer a:hover {
      color: #8a8279;
    }
  </style>
</head>
<body>
  <h1>Age Today</h1>
  <div class="input-row">
    <label for="birthdate">DOB</label>
    <input type="text" id="birthdate" placeholder="e.g. Mar 28 1986 or 3/28/86">
  </div>
  <div id="result"></div>
  <div class="footer">Made for <a href="https://advocatesforchildren.org/donate/" target="_blank">AFC</a> &lt;3</div>
  <script src="popup.js"></script>
</body>
</html>
